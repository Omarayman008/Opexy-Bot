spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opexy_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update # Automatically updates the schema based on our Java Entities
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Discord Bot Configuration
discord:
  bot:
    token: ${DISCORD_BOT_TOKEN:}
  guild:
    id: ${DISCORD_GUILD_ID:}
    
