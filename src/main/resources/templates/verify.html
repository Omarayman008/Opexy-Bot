<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighCore Mc — التحقق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(88, 101, 242, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0c0;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-verify {
            background: linear-gradient(135deg, #5865F2 0%, #404eed 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }
        .btn-verify:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.6);
            background: #4752c4;
        }
        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">⚡</span>
        <h1>التحقق من الهوية</h1>
        <p>مرحباً بك في HighCore Mc. اضغط على الزر أدناه لإتمام عملية التحقق والحصول على الرتبة تلقائياً.</p>
        <a href="/auth/discord" class="btn-verify">تحقق الآن</a>
        <div class="footer">POWERED BY HIGHCORE SYSTEM</div>
    </div>
</body>
</html>
